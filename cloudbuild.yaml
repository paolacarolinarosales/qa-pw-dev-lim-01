steps:
    - name: gcr.io/cloud-builders/docker
    args:
            - build
            - -t
            - gcr.io/$PROJECT_ID/qa-pw-dev-lim-01
            - .
    - name: gcr.io/cloud-builders/docker
    args:
            - push
            - gcr.io/$PROJECT_ID/qa-pw-dev-lim-01
    - name: gcr.io/cloud-builders/docker
    args:
            - run
            - --rm
            - gcr.io/$PROJECT_ID/qa-pw-dev-lim-01
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
